name: Update Lottery Data

on:
  schedule:
    - cron: '0 15 * * 6'  # Saturday 15:00 UTC = Sunday 00:00 KST (after Sat draw)
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC = Sunday 12:00 KST (retry if midnight failed)
    - cron: '0 15 * * 0'  # Sunday 15:00 UTC = Monday 00:00 KST (2nd retry)
    - cron: '0 15 * * 2'  # Tuesday 15:00 UTC = Wednesday 00:00 KST (last resort)
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Update lottery data
        id: first_attempt
        run: npm run update-data
        continue-on-error: true

      - name: Retry after delay
        if: steps.first_attempt.outcome == 'failure'
        run: |
          echo "⚠️ First attempt failed, retrying in 60s..."
          sleep 60
          npm run update-data

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/lotto.json
          git diff --staged --quiet || (git commit -m "data: auto-update lottery data" && git pull --rebase && git push)

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const title = `⚠️ Data update failed (${new Date().toISOString().slice(0, 10)})`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation-failure',
            });
            if (issues.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The automated lottery data update workflow failed after retry.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease check the logs and re-run manually if needed.`,
              labels: ['automation-failure'],
            });
