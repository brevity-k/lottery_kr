name: Health Check

on:
  workflow_run:
    workflows:
      - "Update Lottery Data"
      - "Generate Weekly Blog Post"
      - "Generate Weekly Prediction Post"
    types:
      - completed
  schedule:
    - cron: '0 3 * * 1'  # Monday 03:00 UTC = Monday 12:00 KST
  workflow_dispatch:

concurrency:
  group: health-check
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run health check
        id: first_attempt
        run: npm run health-check
        continue-on-error: true

      - name: Retry after delay
        if: steps.first_attempt.outcome == 'failure'
        run: |
          echo "⚠️ First attempt failed, retrying in 60s..."
          sleep 60
          npm run health-check

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const title = `🏥 Health check failed (${new Date().toISOString().slice(0, 10)})`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation-failure',
            });
            if (issues.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The automated health check failed. One or more checks did not pass.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease check the logs for details on which checks failed.`,
              labels: ['automation-failure'],
            });
